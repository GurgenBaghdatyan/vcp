<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8"/>
    <title>OCPP Station Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Geist:wght@300;400;500;600&display=swap"/>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        [data-theme="dark"] {
            --bg: #080a0f;
            --surface: #0e1117;
            --surface2: #131720;
            --surface3: #1a2030;
            --border: #1c2333;
            --border2: #26334d;
            --accent: #4f8ef7;
            --accent-dim: #1e3a6e;
            --green: #3dd68c;
            --green-dim: #0f3320;
            --red: #f75f5f;
            --red-dim: #3a1010;
            --yellow: #f5a623;
            --text: #cdd6f4;
            --text2: #7b8db0;
            --text3: #3d4f6e;
            --shadow: 0 4px 24px rgba(0, 0, 0, .5);
        }

        [data-theme="light"] {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --surface2: #f0f2f8;
            --surface3: #e8ecf5;
            --border: #dde3ef;
            --border2: #c8d0e4;
            --accent: #2563eb;
            --accent-dim: #dbeafe;
            --green: #16a34a;
            --green-dim: #dcfce7;
            --red: #dc2626;
            --red-dim: #fee2e2;
            --yellow: #d97706;
            --text: #1e293b;
            --text2: #475569;
            --text3: #94a3b8;
            --shadow: 0 4px 24px rgba(0, 0, 0, .08);
        }

        [data-theme="dimmed"] {
            --bg: #1a1d27;
            --surface: #21252f;
            --surface2: #272c38;
            --surface3: #2e3444;
            --border: #313848;
            --border2: #404c62;
            --accent: #7c9ef5;
            --accent-dim: #2a3a62;
            --green: #5bc994;
            --green-dim: #1a3d2e;
            --red: #f08080;
            --red-dim: #3d1a1a;
            --yellow: #f0b84a;
            --text: #dce4f5;
            --text2: #8a9ab8;
            --text3: #4e5e7a;
            --shadow: 0 4px 24px rgba(0, 0, 0, .3);
        }

        [data-theme="solarized"] {
            --bg: #fdf6e3;
            --surface: #eee8d5;
            --surface2: #e6dfcc;
            --surface3: #ddd8c4;
            --border: #cdc8b2;
            --border2: #b8b3a0;
            --accent: #268bd2;
            --accent-dim: #d4eaf7;
            --green: #859900;
            --green-dim: #eef2cc;
            --red: #dc322f;
            --red-dim: #fde0e0;
            --yellow: #b58900;
            --text: #073642;
            --text2: #586e75;
            --text3: #93a1a1;
            --shadow: 0 4px 24px rgba(0, 0, 0, .1);
        }

        /* ══════════════════════════════════════════════
           BASE
        ══════════════════════════════════════════════ */

        html, body {
            height: 100%;
            font-family: var(--sans), serif;
            background: var(--bg);
            color: var(--text);
            transition: background .2s, color .2s;
        }

        body {
            display: grid;
            grid-template-rows: 52px 1fr;
            overflow: hidden;
            --mono: "JetBrains Mono", monospace;
            --sans: "Geist", sans-serif;
            --radius: 10px;
            --radius-sm: 6px;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-dim), transparent 60%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .logo-text {
            font-family: var(--mono), serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: .02em;
        }

        .logo-text span {
            color: var(--text3);
            font-weight: 400;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ── Theme switcher ── */
        .theme-switcher {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .theme-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border2);
            cursor: pointer;
            position: relative;
            transition: border-color .15s, transform .15s;
            overflow: hidden;
            flex-shrink: 0;
        }

        .theme-btn:hover {
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .theme-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        /* Color preview swatches inside each button */
        .theme-btn::before, .theme-btn::after {
            content: '';
            position: absolute;
        }

        /* dark */
        .tb-dark {
            background: #080a0f;
        }

        .tb-dark::before {
            inset: 0 50% 0 0;
            background: #0e1117;
        }

        .tb-dark::after {
            inset: 25% 25% 25% 55%;
            background: #4f8ef7;
            border-radius: 2px;
        }

        /* light */
        .tb-light {
            background: #f4f6fb;
        }

        .tb-light::before {
            inset: 0 50% 0 0;
            background: #ffffff;
        }

        .tb-light::after {
            inset: 25% 25% 25% 55%;
            background: #2563eb;
            border-radius: 2px;
        }

        .tb-dimmed {
            background: #1a1d27;
        }

        .tb-dimmed::before {
            inset: 0 50% 0 0;
            background: #21252f;
        }

        .tb-dimmed::after {
            inset: 25% 25% 25% 55%;
            background: #7c9ef5;
            border-radius: 2px;
        }

        .tb-solarized {
            background: #fdf6e3;
        }

        .tb-solarized::before {
            inset: 0 50% 0 0;
            background: #eee8d5;
        }

        .tb-solarized::after {
            inset: 25% 25% 25% 55%;
            background: #268bd2;
            border-radius: 2px;
        }

        .theme-label {
            font-family: var(--mono), serif;
            font-size: 10px;
            color: var(--text3);
            white-space: nowrap;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text3);
            transition: background .3s;
        }

        .status-dot.ok {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .status-dot.err {
            background: var(--red);
        }

        .status-text {
            font-family: var(--mono), serif;
            font-size: 11px;
            color: var(--text2);
        }

        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
            height: 100%;
        }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 14px 14px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .count-pill {
            font-family: var(--mono), serif;
            font-size: 10px;
            background: var(--surface3);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 2px 8px;
            border-radius: 99px;
        }

        .station-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .station-card {
            padding: 9px 11px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: background .12s, border-color .12s;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn .15s ease;
        }

        .station-card:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .station-card.active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        .station-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
            flex-shrink: 0;
        }

        .station-info {
            flex: 1;
            min-width: 0;
        }

        .station-id {
            font-family: var(--mono), serif;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-ep {
            font-size: 11px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
            font-family: var(--mono), serif;
        }

        .connector-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 4px;
        }

        .connector-badge {
            font-family: var(--mono), serif;
            font-size: 10px;
            font-weight: 500;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid;
            white-space: nowrap;
        }

        .cb-available {
            color: var(--green);
            border-color: var(--green-dim);
            background: var(--green-dim);
        }

        .cb-charging {
            color: var(--accent);
            border-color: var(--accent-dim);
            background: var(--accent-dim);
        }

        .cb-preparing {
            color: var(--yellow);
            border-color: color-mix(in srgb, var(--yellow) 20%, transparent);
            background: color-mix(in srgb, var(--yellow) 10%, transparent);
        }

        .cb-faulted {
            color: var(--red);
            border-color: var(--red-dim);
            background: var(--red-dim);
        }

        .cb-unavailable {
            color: var(--text3);
            border-color: var(--border2);
            background: var(--surface3);
        }

        .cb-finishing {
            color: var(--text2);
            border-color: var(--border2);
            background: var(--surface2);
        }

        .cb-other {
            color: var(--text2);
            border-color: var(--border2);
            background: var(--surface2);
        }

        .btn-remove {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text3);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .12s, color .12s, border-color .12s;
            flex-shrink: 0;
        }

        .btn-remove:hover {
            background: var(--red-dim);
            border-color: var(--red);
            color: var(--red);
        }

        .add-form {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .add-mode-toggle {
            display: flex;
            gap: 4px;
            background: var(--surface3);
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .mode-btn {
            flex: 1;
            padding: 5px 0;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--text2);
            font-family: var(--sans), serif;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .04em;
            text-transform: uppercase;
            transition: background .15s, color .15s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: #fff;
        }

        #panel-single, #panel-batch {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field {
            width: 100%;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--mono), serif;
            font-size: 12px;
            outline: none;
            transition: border-color .15s, background .2s, color .2s;
        }

        .field:focus {
            border-color: var(--accent);
        }

        .field::placeholder {
            color: var(--text3);
        }

        textarea.field {
            resize: vertical;
        }

        .btn-primary {
            padding: 8px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            font-family: var(--sans), serif;
            cursor: pointer;
            transition: opacity .15s;
        }

        .btn-primary:hover {
            opacity: .85;
        }

        .form-msg {
            font-family: var(--mono), serif;
            font-size: 11px;
            min-height: 14px;
        }

        .msg-ok {
            color: var(--green);
        }

        .msg-err {
            color: var(--red);
        }

        /* ── Detail ── */
        .detail {
            display: grid;
            grid-template-rows: 1fr 220px;
            overflow: hidden;
        }

        .workspace {
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Log resize handle ── */
        .log-pane {
            position: relative;
        }

        .log-resize-handle {
            position: absolute;
            top: -4px;
            left: 0;
            right: 0;
            height: 8px;
            cursor: ns-resize;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .log-resize-handle::after {
            content: '';
            width: 32px;
            height: 3px;
            background: var(--border2);
            border-radius: 99px;
            transition: background .15s, width .15s;
        }

        .log-resize-handle:hover::after,
        .log-resize-handle.dragging::after {
            background: var(--accent);
            width: 48px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 10px;
            color: var(--text3);
        }

        .empty-icon {
            font-size: 28px;
            opacity: .4;
        }

        .empty-label {
            font-size: 13px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .panel-body {
            padding: 14px;
        }

        .cmd-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .cmd-pill {
            padding: 5px 12px;
            border-radius: 99px;
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text2);
            font-size: 11px;
            cursor: pointer;
            font-family: var(--mono), serif;
            font-weight: 500;
            transition: border-color .12s, background .12s, color .12s;
        }

        .cmd-pill:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--text);
        }

        .cmd-pill.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .send-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .send-footer {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-send {
            padding: 8px 20px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            font-family: var(--sans), serif;
            cursor: pointer;
            transition: opacity .15s;
        }

        .btn-send:hover {
            opacity: .85;
        }

        .send-status {
            font-family: var(--mono), serif;
            font-size: 11px;
        }

        .log-pane {
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-wrap: wrap;
        }

        .log-label {
            font-family: var(--mono), serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .log-badge {
            font-family: var(--mono), serif;
            font-size: 10px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 1px 7px;
            border-radius: 99px;
        }

        .log-station-name {
            font-family: var(--mono), serif;
            font-size: 10px;
            color: var(--accent);
            margin-left: 2px;
        }

        .log-filters {
            display: flex;
            gap: 3px;
            margin-left: 6px;
        }

        .log-filter-btn {
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text3);
            font-family: var(--mono), serif;
            font-size: 10px;
            cursor: pointer;
            transition: background .12s, color .12s, border-color .12s;
        }

        .log-filter-btn:hover {
            border-color: var(--border2);
            background: var(--surface2);
            color: var(--text2);
        }

        .log-filter-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .log-filter-btn.f-out.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .log-filter-btn.f-inc.active {
            border-color: var(--green);
            background: var(--green-dim);
            color: var(--green);
        }

        .log-filter-btn.f-warn.active {
            border-color: var(--yellow);
            background: color-mix(in srgb, var(--yellow) 12%, transparent);
            color: var(--yellow);
        }

        .log-search-wrap {
            position: relative;
            margin-left: 2px;
        }

        .log-search {
            width: 140px;
            padding: 2px 22px 2px 8px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--mono), serif;
            font-size: 10px;
            outline: none;
            transition: border-color .15s, width .2s;
        }

        .log-search:focus {
            border-color: var(--accent);
            width: 200px;
        }

        .log-search::placeholder {
            color: var(--text3);
        }

        .log-search-clear {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text3);
            font-size: 11px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
            display: none;
        }

        .log-search-clear:hover {
            color: var(--text);
        }

        .log-match {
            background: color-mix(in srgb, var(--yellow) 35%, transparent);
            border-radius: 2px;
            color: var(--text);
        }

        .log-collapse-btn {
            margin-left: auto;
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text3);
            font-size: 13px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .12s, color .12s, border-color .12s;
            font-family: var(--mono), serif;
        }

        .log-collapse-btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
            color: var(--accent);
        }

        .log-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 6px 14px;
        }

        .log-line {
            font-family: var(--mono), serif;
            font-size: 11px;
            line-height: 1.85;
            white-space: pre-wrap;
            word-break: break-all;
            display: flex;
            gap: 8px;
        }

        .log-ts {
            color: var(--text3);
            flex-shrink: 0;
        }

        .l-info {
            color: var(--accent);
            flex-shrink: 0;
        }

        .l-warn {
            color: var(--yellow);
            flex-shrink: 0;
        }

        .l-error {
            color: var(--red);
            flex-shrink: 0;
        }

        .log-msg {
            color: var(--text2);
        }

        .log-line.out .log-msg {
            color: var(--accent);
        }

        .log-line.inc .log-msg {
            color: var(--green);
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 2px;
            padding: 0 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .tab-btn {
            padding: 9px 14px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            font-family: var(--mono), serif;
            color: var(--text3);
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color .15s, border-color .15s;
            margin-bottom: -1px;
        }

        .tab-btn:hover {
            color: var(--text2);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-panel {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .tab-panel.active {
            display: flex;
        }

        /* ── Timeline ── */
        .timeline-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .timeline-label {
            font-family: var(--mono), serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .tl-filter-btn {
            padding: 2px 9px;
            border-radius: 4px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text3);
            font-family: var(--mono), serif;
            font-size: 10px;
            cursor: pointer;
            transition: all .12s;
        }

        .tl-filter-btn:hover {
            border-color: var(--border2);
            background: var(--surface2);
            color: var(--text2);
        }

        .tl-filter-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tl-filter-btn.f-out.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tl-filter-btn.f-in.active {
            border-color: var(--green);
            background: var(--green-dim);
            color: var(--green);
        }

        .tl-filter-btn.f-err.active {
            border-color: var(--red);
            background: var(--red-dim);
            color: var(--red);
        }

        .tl-badge {
            font-family: var(--mono), serif;
            font-size: 10px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 1px 7px;
            border-radius: 99px;
        }

        .tl-new-badge {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            font-family: var(--mono), serif;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            display: none;
            box-shadow: 0 2px 12px rgba(0,0,0,.4);
            z-index: 10;
            white-space: nowrap;
            border: none;
            transition: opacity .15s;
        }

        .tl-new-badge:hover { opacity: .85; }

        .tl-scroll-wrap {
            position: relative;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tl-clear {
            margin-left: auto;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text3);
            font-family: var(--mono), serif;
            font-size: 10px;
            cursor: pointer;
            transition: all .12s;
        }

        .tl-clear:hover {
            border-color: var(--red);
            background: var(--red-dim);
            color: var(--red);
        }

        .tl-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tl-row {
            display: grid;
            grid-template-columns: 80px 24px 80px 1fr 18px;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: var(--surface);
            cursor: pointer;
            transition: background .12s, border-color .12s;
            animation: fadeIn .15s ease;
            font-family: var(--mono), serif;
            font-size: 11px;
        }

        .tl-row:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .tl-row.expanded {
            background: var(--surface2);
            border-color: var(--border2);
        }

        .tl-ts {
            color: var(--text3);
            font-size: 10px;
        }

        .tl-dir-out {
            color: var(--accent);
        }

        .tl-dir-in {
            color: var(--green);
        }

        .tl-dir-err {
            color: var(--red);
        }

        .tl-type-badge {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .04em;
            padding: 1px 5px;
            border-radius: 3px;
            text-align: center;
            text-transform: uppercase;
        }

        .tb-call {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .tb-result {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .tb-error {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .tl-action {
            color: var(--text);
            font-weight: 600;
            font-size: 11px;
        }

        .tl-arrow {
            font-size: 10px;
            color: var(--text3);
            text-align: center;
        }

        .tl-payload-row {
            padding: 0 10px 8px 10px;
            margin-top: -4px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-top: none;
            border-radius: 0 0 6px 6px;
        }

        .tl-payload-json {
            font-family: var(--mono), serif;
            font-size: 11px;
            color: var(--text2);
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            padding-top: 8px;
        }

        /* ── Fault Injection ── */
        .fault-panel-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .fault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .fault-btn {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border2);
            background: var(--surface2);
            cursor: pointer;
            text-align: left;
            transition: all .12s;
        }

        .fault-btn:hover {
            border-color: var(--red);
            background: var(--red-dim);
        }

        .fault-btn-label {
            font-family: var(--mono), serif;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .fault-btn-desc {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.4;
        }

        .fault-recover-btn {
            padding: 9px 18px;
            background: var(--green);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            font-family: var(--sans), serif;
            cursor: pointer;
            transition: opacity .15s;
            align-self: flex-start;
        }

        .fault-recover-btn:hover {
            opacity: .85;
        }

        .fault-status {
            font-family: var(--mono), serif;
            font-size: 11px;
            min-height: 14px;
        }

        .fault-status.ok {
            color: var(--green);
        }

        .fault-status.err {
            color: var(--red);
        }

        .fault-section-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 4px;
        }

        .charging-sim-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .charging-sim-btn {
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text2);
            font-size: 11px;
            font-family: var(--mono), serif;
            font-weight: 600;
            cursor: pointer;
            transition: all .12s;
        }

        .charging-sim-btn.running {
            border-color: var(--green);
            background: var(--green-dim);
            color: var(--green);
        }

        .charging-sim-btn:hover:not(.running) {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .sim-info {
            font-family: var(--mono), serif;
            font-size: 11px;
            color: var(--text3);
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 99px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">OCPP <span>/</span> Station Manager</div>
    </div>
    <div class="header-right">
        <!-- Theme switcher -->
        <span class="theme-label">Theme</span>
        <div class="theme-switcher">
            <button class="theme-btn tb-dark" title="Dark" data-theme="dark"></button>
            <button class="theme-btn tb-dimmed" title="Dimmed" data-theme="dimmed"></button>
            <button class="theme-btn tb-light" title="Light" data-theme="light"></button>
            <button class="theme-btn tb-solarized" title="Solarized" data-theme="solarized"></button>
        </div>
        <!-- Status -->
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="status-text">connecting…</div>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-section">
            <span class="section-label">Stations</span>
            <span class="count-pill" id="station-count">0</span>
        </div>
        <div class="station-list" id="station-list"></div>
        <div class="add-form">
            <div class="section-label" style="padding-bottom:6px;">Add Station</div>

            <!-- Mode toggle -->
            <div class="add-mode-toggle">
                <button class="mode-btn active" id="mode-single">Single</button>
                <button class="mode-btn" id="mode-batch">Batch</button>
            </div>

            <!-- SINGLE mode -->
            <div id="panel-single">
                <label for="new-id"></label><input id="new-id" class="field" placeholder="Charge Point ID"/>
                <label for="new-endpoint"></label><input id="new-endpoint" class="field" placeholder="Endpoint (optional)"/>
                <label for="new-password"></label><input id="new-password" class="field" type="password" placeholder="Password (optional)"/>
                <button class="btn-primary" id="btn-add" style="margin-top:2px;">+ Connect Station</button>
            </div>

            <!-- BATCH mode -->
            <div id="panel-batch" style="display:none;">
                <div style="font-family:var(--mono),serif;font-size:10px;color:var(--text3);margin-bottom:4px;">One ID per line</div>
                <label for="batch-ids"></label><textarea id="batch-ids" class="field" rows="5" placeholder="CP001&#10;CP002&#10;CP003" style="resize:vertical;"></textarea>
                <label for="batch-endpoint"></label><input id="batch-endpoint" class="field" placeholder="Endpoint (optional, overrides default)"/>
                <label for="batch-password"></label><input id="batch-password" class="field" type="password" placeholder="Password (optional)"/>
                <button class="btn-primary" id="btn-batch" style="margin-top:2px;">⚡ Connect All</button>
                <div id="batch-progress" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                        <span style="font-family:var(--mono),serif;font-size:10px;color:var(--text2);" id="batch-status-text">Connecting…</span>
                        <span style="font-family:var(--mono),serif;font-size:10px;color:var(--text3);" id="batch-counter">0/0</span>
                    </div>
                    <div style="height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;">
                        <div id="batch-bar" style="height:100%;width:0;background:var(--accent);border-radius:2px;transition:width .2s;"></div>
                    </div>
                    <div id="batch-errors" style="margin-top:6px;font-family:var(--mono),serif;font-size:10px;color:var(--red);max-height:60px;overflow-y:auto;"></div>
                </div>
            </div>

            <div class="form-msg" id="add-msg"></div>
        </div>
    </div>

    <div class="detail">
        <div class="workspace" id="workspace" style="display:flex; flex-direction:column; padding:0; gap:0;">
            <div class="empty-state" id="empty-state" style="flex:1;">
                <div class="empty-icon">⚡</div>
                <div class="empty-label">Select a station to inspect</div>
            </div>
            <div id="detail-content" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="commands">Commands</button>
                    <button class="tab-btn" data-tab="timeline">Timeline</button>
                    <button class="tab-btn" data-tab="faults">Fault Injection</button>
                </div>

                <!-- Commands tab -->
                <div class="tab-panel active" id="tab-commands" style="overflow-y:auto;">
                    <div style="padding:16px; display:flex; flex-direction:column; gap:12px;">
                        <div class="panel">
                            <div class="panel-header"><span class="panel-title">Quick Commands</span></div>
                            <div class="panel-body">
                                <div class="cmd-grid" id="cmd-grid"></div>
                            </div>
                        </div>
                        <div class="panel">
                            <div class="panel-header"><span class="panel-title">Send Message</span></div>
                            <div class="panel-body">
                                <div class="send-form">
                                    <div class="form-row">
                                        <label class="form-label">Action</label>
                                        <label for="action"></label><input id="action" class="field"
                                                                           placeholder="e.g. Heartbeat"/>
                                    </div>
                                    <div class="form-row">
                                        <label class="form-label">Payload <span
                                                style="text-transform:none;letter-spacing:0;font-weight:400;">(JSON)</span></label>
                                        <label for="payload"></label><textarea id="payload" class="field" rows="5"
                                                                               spellcheck="false">{}</textarea>
                                    </div>
                                    <div class="send-footer">
                                        <button class="btn-send" id="btn-send">Send ↗</button>
                                        <span class="send-status" id="send-status"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Timeline tab -->
                <div class="tab-panel" id="tab-timeline">
                    <div class="timeline-toolbar">
                        <span class="timeline-label">Traffic</span>
                        <span class="tl-badge" id="tl-count">0</span>
                        <div style="display:flex;gap:3px;">
                            <button class="tl-filter-btn active" data-tl-filter="all">All</button>
                            <button class="tl-filter-btn f-out" data-tl-filter="out">↗ Sent</button>
                            <button class="tl-filter-btn f-in" data-tl-filter="in">↙ Received</button>
                            <button class="tl-filter-btn f-err" data-tl-filter="error">✕ Error</button>
                        </div>
                        <button class="tl-clear" id="tl-clear">Clear</button>
                    </div>
                    <div class="tl-scroll-wrap">
                        <button class="tl-new-badge" id="tl-new-badge"></button>
                        <div class="tl-scroll" id="tl-scroll">
                            <div class="empty-state" id="tl-empty" style="height:100%;min-height:120px;">
                                <div class="empty-icon" style="font-size:20px;">📡</div>
                                <div class="empty-label">No traffic yet — send a message</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Fault Injection tab -->
                <div class="tab-panel" id="tab-faults" style="overflow-y:auto;">
                    <div class="fault-panel-body">
                        <div>
                            <div class="fault-section-title">Error Codes</div>
                            <div class="fault-grid" id="fault-grid"></div>
                        </div>
                        <div>
                            <div class="fault-section-title" style="margin-bottom:8px;">Charging Simulation</div>
                            <div class="charging-sim-row">
                                <button class="charging-sim-btn" id="sim-btn">▶ Start Charging Sim</button>
                                <span class="sim-info"
                                      id="sim-info">Sends MeterValues every 30s with increasing energy</span>
                            </div>
                        </div>
                        <div>
                            <div class="fault-section-title" style="margin-bottom:8px;">Recover</div>
                            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                                <button class="fault-recover-btn" id="fault-recover-btn">✓ Send Available</button>
                                <span class="fault-status" id="fault-status"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="log-pane" id="log-pane">
            <div class="log-resize-handle" id="log-resize-handle"></div>
            <div class="log-toolbar">
                <span class="log-label">Logs</span>
                <span class="log-badge" id="log-count">0</span>
                <span class="log-station-name" id="log-station"></span>
                <div class="log-filters">
                    <button class="log-filter-btn active" data-filter="all">All</button>
                    <button class="log-filter-btn f-out" data-filter="out">↗ Out</button>
                    <button class="log-filter-btn f-inc" data-filter="inc">↙ In</button>
                    <button class="log-filter-btn f-warn" data-filter="warn">⚠ Warn</button>
                </div>
                <div class="log-search-wrap">
                    <label for="log-search"></label><input class="log-search" id="log-search" placeholder="Search…"
                                                           autocomplete="off" spellcheck="false"/>
                    <button class="log-search-clear" id="log-search-clear">✕</button>
                </div>
                <button class="log-collapse-btn" id="log-collapse-btn" title="Collapse / Expand">╵</button>
            </div>
            <div class="log-scroll" id="log-scroll"></div>
        </div>
    </div>
</div>

<script>
    // ── Theme ──────────────────────────────────────────────────────────────────
    const THEMES = ["dark", "dimmed", "light", "solarized"];
    const root = document.documentElement;

    function applyTheme(t) {
        if (!THEMES.includes(t)) t = "dark";
        root.setAttribute("data-theme", t);
        localStorage.setItem("ocpp-theme", t);
        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.theme === t);
        });
    }

    document.querySelectorAll(".theme-btn").forEach(btn => btn.addEventListener("click", () => applyTheme(btn.dataset.theme)));
    applyTheme(localStorage.getItem("ocpp-theme") || "dark");

    // ── Tabs ───────────────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
            if (btn.dataset.tab === "timeline" && activeStation) {
                // flush any pending-count and scroll to bottom without re-render
                const scroll = document.getElementById("tl-scroll");
                const badge = document.getElementById("tl-new-badge");
                pendingNewCount = 0;
                badge.style.display = "none";
                scroll.scrollTop = scroll.scrollHeight;
            }
        });
    });

    // ── Commands ───────────────────────────────────────────────────────────────
    const COMMANDS = [
        {
            label: "Boot",
            action: "BootNotification",
            payload: {chargePointVendor: "Solidstudio", chargePointModel: "VirtualCP"}
        },
        {
            label: "Available",
            action: "StatusNotification",
            payload: {connectorId: 1, errorCode: "NoError", status: "Available"}
        },
        {
            label: "Preparing",
            action: "StatusNotification",
            payload: {connectorId: 1, errorCode: "NoError", status: "Preparing"}
        },
        {
            label: "Charging",
            action: "StatusNotification",
            payload: {connectorId: 1, errorCode: "NoError", status: "Charging"}
        },
        {
            label: "Faulted",
            action: "StatusNotification",
            payload: {connectorId: 1, errorCode: "InternalError", status: "Faulted"}
        },
        {label: "Heartbeat", action: "Heartbeat", payload: {}},
        {label: "Authorize", action: "Authorize", payload: {idTag: "AABBCCDD"}},
        {
            label: "StartTx", action: "StartTransaction", get payload() {
                return {connectorId: 1, idTag: "AABBCCDD", meterStart: 0, timestamp: new Date().toISOString()};
            }
        },
        {
            label: "StopTx", action: "StopTransaction", get payload() {
                return {
                    transactionId: 1,
                    meterStop: 100,
                    timestamp: new Date().toISOString(),
                    reason: "Remote",
                    idTag: "AABBCCDD"
                };
            }
        },
    ];

    let activeStation = null, lastLogLen = 0, activeCmd = null;

    for (const cmd of COMMANDS) {
        const pill = document.createElement("button");
        pill.className = "cmd-pill";
        pill.textContent = cmd.label;
        pill.onclick = () => {
            activeCmd?.classList.remove("active");
            pill.classList.add("active");
            activeCmd = pill;
            document.getElementById("action").value = cmd.action;
            document.getElementById("payload").value = JSON.stringify(cmd.payload, null, 2);
        };
        document.getElementById("cmd-grid").appendChild(pill);
    }

    // ── Fault Injection ────────────────────────────────────────────────────────
    const FAULTS = [
        {label: "ConnectorLockFailure", desc: "Connector locking mechanism failure"},
        {label: "EVCommunicationError", desc: "Communication failure with EV"},
        {label: "GroundFailure", desc: "Ground fault detected"},
        {label: "HighTemperature", desc: "Temperature too high"},
        {label: "InternalError", desc: "Internal hardware / software error"},
        {label: "LocalListConflict", desc: "Presented token conflicts with local list"},
        {label: "NoError", desc: "No error (use for recovery)"},
        {label: "OtherError", desc: "Any other error"},
        {label: "OverCurrentFailure", desc: "Over-current protection triggered"},
        {label: "OverVoltage", desc: "Voltage higher than specification"},
        {label: "PowerMeterFailure", desc: "Power meter communication failure"},
        {label: "PowerSwitchFailure", desc: "Power switch control failure"},
        {label: "ReaderFailure", desc: "RFID reader failure"},
        {label: "ResetFailure", desc: "Reset failure"},
        {label: "UnderVoltage", desc: "Voltage below specification"},
        {label: "WeakSignal", desc: "Wireless link too weak"},
    ];

    const faultGrid = document.getElementById("fault-grid");
    for (const f of FAULTS) {
        const btn = document.createElement("button");
        btn.className = "fault-btn";
        btn.innerHTML = `<span class="fault-btn-label">${f.label}</span><span class="fault-btn-desc">${f.desc}</span>`;
        btn.onclick = () => sendFault(f.label);
        faultGrid.appendChild(btn);
    }

    async function sendFault(errorCode) {
        if (!activeStation) return;
        const statusEl = document.getElementById("fault-status");
        statusEl.textContent = "";
        statusEl.className = "fault-status";
        try {
            const isFault = errorCode !== "NoError";

            // If faulting and a sim is running — stop it first
            if (isFault && simInterval) {
                clearInterval(simInterval);
                simInterval = null;
                simBtn.textContent = "▶ Start Charging Sim";
                simBtn.classList.remove("running");
                simInfo.textContent = "Sends MeterValues every 30s with increasing energy";
                // send StopTransaction
                await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        action: "StopTransaction",
                        payload: {
                            transactionId: simTxId,
                            meterStop: simMeter,
                            timestamp: new Date().toISOString(),
                            reason: "EmergencyStop",
                            idTag: "AABBCCDD"
                        }
                    }),
                });
                await new Promise(r => setTimeout(r, 200));
            }

            const r = await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    action: "StatusNotification",
                    payload: {connectorId: 1, errorCode, status: isFault ? "Faulted" : "Available"}
                }),
            });
            if (!r.ok) throw new Error(await r.text());
            statusEl.textContent = isFault ? `⚠ Faulted: ${errorCode}` : "✓ Available";
            statusEl.className = isFault ? "fault-status err" : "fault-status ok";
            setTimeout(() => statusEl.textContent = "", 4000);
        } catch (e) {
            statusEl.textContent = e.message;
            statusEl.className = "fault-status err";
        }
    }

    document.getElementById("fault-recover-btn").onclick = () => sendFault("NoError");

    // ── Charging Simulation ────────────────────────────────────────────────────
    let simInterval = null;
    let simMeter = 0;
    let simTxId = 1;

    const simBtn = document.getElementById("sim-btn");
    const simInfo = document.getElementById("sim-info");

    simBtn.onclick = async () => {
        if (simInterval) {
            clearInterval(simInterval);
            simInterval = null;
            simBtn.textContent = "▶ Start Charging Sim";
            simBtn.classList.remove("running");
            simInfo.textContent = "Sends MeterValues every 30s with increasing energy";
            // send StopTransaction
            if (activeStation) {
                await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        action: "StopTransaction",
                        payload: {
                            transactionId: simTxId,
                            meterStop: simMeter,
                            timestamp: new Date().toISOString(),
                            reason: "Local",
                            idTag: "AABBCCDD"
                        }
                    }),
                });
            }
            return;
        }
        if (!activeStation) return;
        simMeter = 0;
        simTxId = Math.floor(Math.random() * 90000) + 10000;
        // Authorize → StartTransaction
        await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({action: "Authorize", payload: {idTag: "AABBCCDD"}}),
        });
        await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: "StartTransaction",
                payload: {connectorId: 1, idTag: "AABBCCDD", meterStart: 0, timestamp: new Date().toISOString()}
            }),
        });
        await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                action: "StatusNotification",
                payload: {connectorId: 1, errorCode: "NoError", status: "Charging"}
            }),
        });

        simBtn.textContent = "■ Stop Charging Sim";
        simBtn.classList.add("running");

        simInterval = setInterval(async () => {
            if (!activeStation) {
                clearInterval(simInterval);
                simInterval = null;
                return;
            }
            simMeter += Math.floor(Math.random() * 500 + 200); // 200–700 Wh per interval
            const elapsed = Math.floor(simMeter / 1000 * 10) / 10; // fake kWh
            simInfo.textContent = `⚡ ${elapsed} kWh charged (txId: ${simTxId})`;
            await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    action: "MeterValues",
                    payload: {
                        connectorId: 1,
                        transactionId: simTxId,
                        meterValue: [{
                            timestamp: new Date().toISOString(),
                            sampledValue: [{
                                value: String(simMeter),
                                measurand: "Energy.Active.Import.Register",
                                unit: "Wh"
                            }]
                        }]
                    }
                }),
            });
        }, 10000); // every 10s for demo (use 30000 for real)
    };

    // ── Timeline ───────────────────────────────────────────────────────────────
    let trafficCache = [];
    let tlFilter = "all";
    let expandedIds = new Set();
    let trafficSSE = null;

    document.querySelectorAll(".tl-filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tl-filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            tlFilter = btn.dataset.tlFilter;
            renderTimeline();
        });
    });

    document.getElementById("tl-clear").onclick = () => {
        trafficCache = [];
        expandedIds.clear();
        renderTimeline();
    };

    function connectTrafficSSE(id) {
        if (trafficSSE) { trafficSSE.close(); trafficSSE = null; }
        trafficCache = [];
        expandedIds.clear();
        pendingNewCount = 0;
        renderTimeline(); // clear DOM

        const es = new EventSource("/stations/" + encodeURIComponent(id) + "/traffic/stream");
        es.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === "snapshot") {
                trafficCache = data.traffic || [];
                renderTimeline(); // full render on snapshot
            } else if (data.type === "entry") {
                trafficCache.push(data.entry);
                if (trafficCache.length > 500) trafficCache.shift();
                const isActive = document.getElementById("tab-timeline").classList.contains("active");
                if (isActive) appendTimelineEntry(data.entry);
                else pendingNewCount++;
            }
            document.getElementById("tl-count").textContent = trafficCache.length;
        };
        es.onerror = () => {};
        trafficSSE = es;
    }

    function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function makeTlRowHTML(entry) {
        const ts = (entry.timestamp || "").replace("T", " ").slice(11, 19);
        const isOut = entry.direction === "out";
        const isErr = entry.messageType === "CallError";
        const dirCls = isErr ? "tl-dir-err" : isOut ? "tl-dir-out" : "tl-dir-in";
        const dirSymbol = isErr ? "✕" : isOut ? "↗" : "↙";
        const typeCls = isErr ? "tb-error" : entry.messageType === "CallResult" ? "tb-result" : "tb-call";
        const typeLabel = isErr ? "err" : entry.messageType === "CallResult" ? "res" : "req";
        const action = entry.action || (isErr ? `${entry.errorCode}` : "—");
        const isExpanded = expandedIds.has(entry.id);
        const payloadJson = JSON.stringify(entry.payload, null, 2);
        return `<div class="tl-row${isExpanded ? " expanded" : ""}" data-tl-id="${esc(entry.id)}" onclick="toggleTlRow('${esc(entry.id)}')">
                <span class="tl-ts">${ts}</span>
                <span class="${dirCls}">${dirSymbol}</span>
                <span class="tl-type-badge ${typeCls}">${typeLabel}</span>
                <span class="tl-action">${esc(action)}</span>
                <span class="tl-arrow">${isExpanded ? "▲" : "▼"}</span>
            </div>${isExpanded ? `<div class="tl-payload-row"><pre class="tl-payload-json">${esc(payloadJson)}</pre></div>` : ""}`;
    }

    let pendingNewCount = 0;

    function appendTimelineEntry(entry) {
        const scroll = document.getElementById("tl-scroll");
        const empty = document.getElementById("tl-empty");
        const badge = document.getElementById("tl-new-badge");

        // hide empty state
        empty.style.display = "none";

        // check if entry passes current filter
        if (tlFilter === "out" && entry.direction !== "out") return;
        if (tlFilter === "in" && entry.direction !== "in") return;
        if (tlFilter === "error" && entry.messageType !== "CallError") return;

        const atBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 60;

        const tmp = document.createElement("div");
        tmp.innerHTML = makeTlRowHTML(entry);
        while (tmp.firstChild) scroll.appendChild(tmp.firstChild);

        // cap DOM rows at 200
        const rows = scroll.querySelectorAll(".tl-row");
        if (rows.length > 200) {
            let toRemove = rows.length - 200;
            for (let i = 0; i < toRemove; i++) {
                const row = rows[i];
                // also remove payload if expanded
                if (row.nextSibling && row.nextSibling.classList && row.nextSibling.classList.contains("tl-payload-row")) {
                    row.nextSibling.remove();
                }
                row.remove();
            }
        }

        if (atBottom) {
            scroll.scrollTop = scroll.scrollHeight;
            badge.style.display = "none";
            pendingNewCount = 0;
        } else {
            pendingNewCount++;
            badge.textContent = `↓ ${pendingNewCount} new message${pendingNewCount > 1 ? "s" : ""}`;
            badge.style.display = "";
        }
    }

    // scroll-to-bottom badge click
    document.getElementById("tl-new-badge").onclick = () => {
        const scroll = document.getElementById("tl-scroll");
        scroll.scrollTo({top: scroll.scrollHeight, behavior: "smooth"});
    };

    // hide badge when user manually scrolls to bottom
    document.getElementById("tl-scroll").addEventListener("scroll", () => {
        const scroll = document.getElementById("tl-scroll");
        const badge = document.getElementById("tl-new-badge");
        if (scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 30) {
            badge.style.display = "none";
            pendingNewCount = 0;
        }
    });

    function renderTimeline() {
        const scroll = document.getElementById("tl-scroll");
        const empty = document.getElementById("tl-empty");
        const badge = document.getElementById("tl-new-badge");
        pendingNewCount = 0;
        badge.style.display = "none";

        let entries = trafficCache;
        if (tlFilter === "out") entries = entries.filter(e => e.direction === "out");
        if (tlFilter === "in") entries = entries.filter(e => e.direction === "in");
        if (tlFilter === "error") entries = entries.filter(e => e.messageType === "CallError");
        entries = entries.slice(-200);

        document.getElementById("tl-count").textContent = trafficCache.length;

        if (entries.length === 0) {
            scroll.innerHTML = "";
            scroll.appendChild(empty);
            empty.style.display = "flex";
            return;
        }
        empty.style.display = "none";
        scroll.innerHTML = entries.map(makeTlRowHTML).join("");
        scroll.scrollTop = scroll.scrollHeight;
    }

    window.toggleTlRow = function (id) {
        if (expandedIds.has(id)) expandedIds.delete(id);
        else expandedIds.add(id);
        // re-render only the clicked row in place to avoid scroll jump
        const scroll = document.getElementById("tl-scroll");
        const rowEl = scroll.querySelector(`[data-tl-id="${id}"]`);
        if (!rowEl) { renderTimeline(); return; }
        const entry = trafficCache.find(e => e.id === id);
        if (!entry) return;
        const tmp = document.createElement("div");
        tmp.innerHTML = makeTlRowHTML(entry);
        // remove old payload row if present
        if (rowEl.nextSibling && rowEl.nextSibling.classList && rowEl.nextSibling.classList.contains("tl-payload-row")) {
            rowEl.nextSibling.remove();
        }
        rowEl.replaceWith(...tmp.childNodes);
    };

    // ── Helpers ────────────────────────────────────────────────────────────────
    function setMsg(el, text, ok) {
        el.textContent = text;
        el.className = "form-msg" + (ok === true ? " msg-ok" : ok === false ? " msg-err" : "");
    }

    const STATUS_CLASS = {
        Available: "cb-available", Charging: "cb-charging", Preparing: "cb-preparing",
        Faulted: "cb-faulted", Unavailable: "cb-unavailable", Finishing: "cb-finishing",
        SuspendedEV: "cb-finishing", SuspendedEVSE: "cb-finishing", Reserved: "cb-other",
    };

    async function fetchConnectors(id) {
        try {
            const d = await fetch("/stations/" + encodeURIComponent(id) + "/state").then(r => r.json());
            return d.connectors || {};
        } catch {
            return {};
        }
    }

    async function renderStations() {
        let stations = [];
        try {
            stations = await fetch("/stations").then(r => r.json());
        } catch {
            return;
        }
        document.getElementById("station-count").textContent = stations.length;
        const list = document.getElementById("station-list");
        list.innerHTML = "";
        for (const s of stations) {
            const connectors = await fetchConnectors(s.chargePointId);
            const card = document.createElement("div");
            card.className = "station-card" + (s.chargePointId === activeStation ? " active" : "");
            const badgesHtml = Object.entries(connectors).map(([cid, status]) => {
                const cls = STATUS_CLASS[status] || "cb-other";
                return `<span class="connector-badge ${cls}">#${cid} ${status}</span>`;
            }).join("");
            card.innerHTML = `
                <div class="station-dot"></div>
                <div class="station-info">
                    <div class="station-id">${esc(s.chargePointId)}</div>
                    <div class="station-ep">${esc(s.endpoint)}</div>
                    ${badgesHtml ? `<div class="connector-badges">${badgesHtml}</div>` : ""}
                </div>
                <button class="btn-remove" title="Disconnect">✕</button>`;
            card.onclick = e => {
                if (!e.target.classList.contains("btn-remove")) selectStation(s.chargePointId);
            };
            card.querySelector(".btn-remove").onclick = async e => {
                e.stopPropagation();
                await fetch("/stations/" + encodeURIComponent(s.chargePointId), {method: "DELETE"});
                if (activeStation === s.chargePointId) deselectStation();
                renderStations();
            };
            list.appendChild(card);
        }
    }

    function selectStation(id) {
        activeStation = id;
        document.getElementById("empty-state").style.display = "none";

    // ── Mode toggle ────────────────────────────────────────────────
    document.getElementById("mode-single").onclick = () => {

        document.getElementById("panel-batch").style.display = "none";

        document.getElementById("panel-batch").style.display = "";

    // ── Single add ────────────────────────────────────────────────
    document.getElementById("btn-add").onclick = async () => {
        const id = document.getElementById("new-id").value.trim();
        const ep = document.getElementById("new-endpoint").value.trim();
        const pw = document.getElementById("new-password").value.trim();
        const msg = document.getElementById("add-msg");
        if (!id) { setMsg(msg, "Charge Point ID required", false); return; }
        setMsg(msg, "Connecting…", null);
        try {
            const d = await fetch("/stations", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({chargePointId: id, endpoint: ep || undefined, password: pw || undefined}),
            }).then(r => r.json());
            if (d.ok) {
                setMsg(msg, "✓ Connected", true);
                ["new-id", "new-endpoint", "new-password"].forEach(x => document.getElementById(x).value = "");
                renderStations();
                setTimeout(() => msg.textContent = "", 3000);
            } else {
                setMsg(msg, d.error || "Failed", false);
            }
        } catch (e) { setMsg(msg, e.message, false); }
    };

    // ── Batch add ────────────────────────────────────────────────
    document.getElementById("btn-batch").onclick = async () => {
        const raw = document.getElementById("batch-ids").value;
        const ep  = document.getElementById("batch-endpoint").value.trim();
        const pw  = document.getElementById("batch-password").value.trim();
        const msg = document.getElementById("add-msg");

        const ids = raw.split("\n").map(s => s.trim()).filter(Boolean);
        if (ids.length === 0) { setMsg(msg, "Enter at least one ID", false); return; }

        const progress  = document.getElementById("batch-progress");
        const bar       = document.getElementById("batch-bar");
        const counter   = document.getElementById("batch-counter");
        const statusTxt = document.getElementById("batch-status-text");
        const errBox    = document.getElementById("batch-errors");

        progress.style.display = "";
        bar.style.background = "var(--accent)";
        bar.style.width = "0%";
        errBox.textContent = "";
        document.getElementById("btn-batch").disabled = true;
        setMsg(msg, "", null);

        let done = 0, failed = 0;
        const errors = [];

        for (const id of ids) {
            statusTxt.textContent = `Connecting ${id}…`;
            counter.textContent   = `${done}/${ids.length}`;
            try {
                const d = await fetch("/stations", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({chargePointId: id, endpoint: ep || undefined, password: pw || undefined}),
                }).then(r => r.json());
                if (!d.ok) { failed++; errors.push(`✗ ${id}: ${d.error || "failed"}`); }
            } catch (e) { failed++; errors.push(`✗ ${id}: ${e.message}`); }
            done++;
            bar.style.width = `${Math.round((done / ids.length) * 100)}%`;
            counter.textContent = `${done}/${ids.length}`;
            errBox.textContent = errors.join("\n");
            renderStations();
        }

        const ok = done - failed;
        statusTxt.textContent = `Done — ${ok} connected, ${failed} failed`;
        bar.style.background = failed === 0 ? "var(--green)" : failed === done ? "var(--red)" : "var(--yellow)";
        document.getElementById("btn-batch").disabled = false;
        if (failed === 0) {
            document.getElementById("batch-ids").value = "";
            setTimeout(() => { progress.style.display = "none"; bar.style.width = "0%"; bar.style.background = "var(--accent)"; }, 3000);
        }
    };

    document.getElementById("btn-send").onclick = async () => {
        if (!activeStation) return;
        const statusEl = document.getElementById("send-status");
        const action = document.getElementById("action").value.trim();
        const raw = document.getElementById("payload").value.trim();
        if (!action) {
            statusEl.textContent = "Action required";
            statusEl.style.color = "var(--red)";
            return;
        }
        let payload;
        try {
            payload = JSON.parse(raw || "{}");
        } catch {
            statusEl.textContent = "Invalid JSON";
            statusEl.style.color = "var(--red)";
            return;
        }
        try {
            const r = await fetch("/stations/" + encodeURIComponent(activeStation) + "/execute", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({action, payload}),
            });
            if (!r.ok) throw new Error(await r.text());
            statusEl.textContent = "✓ Sent";
            statusEl.style.color = "var(--green)";
            setTimeout(() => statusEl.textContent = "", 2500);
        } catch (e) {
            statusEl.textContent = e.message;
            statusEl.style.color = "var(--red)";
        }
    };

    // ── Log filter ─────────────────────────────────────────────────────────────
    let activeFilter = "all";
    let logCache = [];
    let logSearch = "";

    document.querySelectorAll(".log-filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".log-filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeFilter = btn.dataset.filter;

        });

    const searchInput = document.getElementById("log-search");

    searchInput.addEventListener("input", () => {
        logSearch = searchInput.value;
        searchClear.style.display = logSearch ? "block" : "none";

    });
    searchClear.addEventListener("click", () => {

        searchInput.focus();
        renderLogs();

        if ((e.ctrlKey || e.metaKey) && e.key === "f" && activeStation) {
            e.preventDefault();
            searchInput.focus();
            searchInput.select();
        }
        if (e.key === "Escape" && document.activeElement === searchInput) searchInput.blur();
