<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>OCPP VCP Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"/>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0e14;
            --surface: #111620;
            --surface2: #181f2e;
            --border: #1e2840;
            --border2: #2a3650;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: "IBM Plex Mono", monospace;
            --sans: "IBM Plex Sans", sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--sans),serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-rows: 48px 1fr;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--mono),serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .04em;
            color: var(--accent2);
        }

        .logo span {
            color: var(--muted);
        }

        .badge {
            font-family: var(--mono),serif;
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 99px;
            border: 1px solid var(--border2);
            color: var(--muted);
            margin-left: auto;
        }

        nav {
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-section {
            font-family: var(--mono),serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 8px 4px;
        }

        .cmd-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
        }

        .cmd-btn.active .cmd-dot {
            background: var(--accent);
        }

        main {
            display: grid;
            grid-template-rows: 1fr 200px;
            overflow: hidden;
        }

        .workspace {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .03em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .panel-body {
            padding: 16px;
        }

        .state-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .state-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .state-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .state-value {
            font-family: var(--mono),serif;
            font-size: 13px;
            color: var(--text);
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label.field-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input.field, textarea.field {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 7px;
            color: var(--text);
            font-family: var(--mono),serif;
            font-size: 13px;
            outline: none;
            transition: border-color .15s;
            resize: vertical;
        }

        input.field:focus, textarea.field:focus {
            border-color: var(--accent);
        }

        .send-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }

        .btn-send {
            padding: 9px 20px;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #fff;
            font-family: var(--sans),serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-send:hover {
            background: #2563eb;
        }

        #send-status {
            font-family: var(--mono),serif;
            font-size: 12px;
        }

        .log-pane {
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .log-title {
            font-family: var(--mono),serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .log-count {
            font-family: var(--mono),serif;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--muted);
            padding: 1px 7px;
            border-radius: 99px;
        }

        .log-count {
            font-size: 10px;
        }

        .log-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
        }

        .log-line {
            font-family: var(--mono),serif;
            font-size: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-ts {
            color: #334155;
        }

        .log-msg {
            color: #94a3b8;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">OCPP <span>/</span> VCP Admin</div>
    <div class="badge" id="health-badge">connecting…</div>
</header>

<nav>
    <div class="nav-section">Commands</div>
    <div id="cmd-list"></div>
</nav>

<main>
    <div class="workspace">
        <div class="panel">
            <div class="panel-header">
                <span>Connection State</span>
                <span id="ready-state" style="font-family:var(--mono),serif;font-size:11px;"></span>
            </div>
            <div class="panel-body">
                <div class="state-grid">
                    <div class="state-item">
                        <div class="state-label">Charge Point</div>
                        <div class="state-value" id="s-cpid">—</div>
                    </div>
                    <div class="state-item">
                        <div class="state-label">Endpoint</div>
                        <div class="state-value" id="s-ep">—</div>
                    </div>
                    <div class="state-item">
                        <div class="state-label">OCPP Version</div>
                        <div class="state-value" id="s-ver">—</div>
                    </div>
                    <div class="state-item">
                        <div class="state-label">Connected</div>
                        <div class="state-value" id="s-conn">—</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">Send Message</div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:12px;">
                <div class="form-row">
                    <label class="field-label">Action</label>
                    <label for="action"></label><input id="action" class="field" readonly placeholder="Select a command →"/>
                </div>
                <div class="form-row">
                    <label class="field-label">Payload <span
                            style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(JSON)</span></label>
                    <label for="payload"></label><textarea id="payload" class="field" rows="6" spellcheck="false"></textarea>
                </div>
                <div class="send-row">
                    <button class="btn-send" id="btn-send">Send ↗</button>
                    <span id="send-status"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="log-pane">
        <div class="log-toolbar">
            <span class="log-title">Logs</span>
            <span class="log-count" id="log-count">0</span>
        </div>
        <div class="log-scroll" id="log-scroll"></div>
    </div>
</main>

<script>
    const COMMANDS = [
        {
            label: "BootNotification",
            action: "BootNotification",
            payload: {chargePointVendor: "Solidstudio", chargePointModel: "VirtualCP"}
        },
        {
            label: "Status — Available",
            action: "StatusNotification",
            payload: {connectorId: 1, errorCode: "NoError", status: "Available"}
        },
        {
            label: "Status — Charging",
            action: "StatusNotification",
            payload: {connectorId: 1, errorCode: "NoError", status: "Charging"}
        },
        {label: "Heartbeat", action: "Heartbeat", payload: {}},
        {label: "Authorize", action: "Authorize", payload: {idTag: "AABBCCDD"}},
        {
            label: "StartTransaction",
            action: "StartTransaction",
            payload: {connectorId: 1, idTag: "AABBCCDD", meterStart: 0, timestamp: new Date().toISOString()}
        },
        {
            label: "StopTransaction",
            action: "StopTransaction",
            payload: {transactionId: 1, meterStop: 10, timestamp: new Date().toISOString()}
        },
        {
            label: "MeterValues",
            action: "MeterValues",
            payload: {
                connectorId: 1,
                transactionId: 1,
                meterValue: [{
                    timestamp: new Date().toISOString(),
                    sampledValue: [{value: "1.0", measurand: "Energy.Active.Import.Register"}]
                }]
            }
        },
        {
            label: "RemoteStartTransaction",
            action: "RemoteStartTransaction",
            payload: {idTag: "AABBCCDD", connectorId: 1}
        },
        {label: "RemoteStopTransaction", action: "RemoteStopTransaction", payload: {transactionId: 1}},
        {label: "Custom", action: "", payload: {}},
    ];

    const actionEl = document.getElementById("action");
    const payloadEl = document.getElementById("payload");
    const statusEl = document.getElementById("send-status");
    const logScroll = document.getElementById("log-scroll");
    const logCount = document.getElementById("log-count");
    let activeBtn = null;
    let lastLogLen = 0;

    for (const cmd of COMMANDS) {
        const btn = document.createElement("button");
        btn.className = "cmd-btn";
        btn.innerHTML = '<span class="cmd-dot"></span>' + cmd.label;
        btn.onclick = () => {
            activeBtn?.classList.remove("active");
            btn.classList.add("active");
            activeBtn = btn;
            actionEl.value = cmd.action;
            payloadEl.value = cmd.label === "Custom" ? "{}" : JSON.stringify(cmd.payload, null, 2);
        };
        document.getElementById("cmd-list").appendChild(btn);
    }

    function escHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function fetchState() {
        try {
            const d = await fetch("/state").then(r => r.json());
            document.getElementById("s-cpid").textContent = d.chargePointId ?? "—";
            document.getElementById("s-ep").textContent = d.endpoint ?? "—";
            document.getElementById("s-ver").textContent = d.ocppVersion ?? "—";
            const connEl = document.getElementById("s-conn");
            connEl.textContent = d.connected ? "yes" : "no";
            connEl.style.color = d.connected ? "var(--green)" : "var(--red)";
            document.getElementById("ready-state").textContent = "readyState " + (d.readyState ?? "—");
        } catch {
        }
    }

    async function fetchHealth() {
        const badge = document.getElementById("health-badge");
        try {
            badge.textContent = await fetch("/health").then(r => r.text());
            badge.className = "badge ok";
        } catch {
            badge.textContent = "offline";
            badge.className = "badge err";
        }
    }

    async function fetchLogs() {
        try {
            const {logs = []} = await fetch("/logs").then(r => r.json());
            logCount.textContent = logs.length;
            if (logs.length === lastLogLen) return;
            lastLogLen = logs.length;
            const atBottom = logScroll.scrollHeight - logScroll.scrollTop - logScroll.clientHeight < 40;
            logScroll.innerHTML = logs.slice(-300).map(l => {
                const lvl = (l.level || "info").toLowerCase();
                const cls = lvl === "warn" ? "log-warn" : lvl === "error" ? "log-error" : "log-info";
                const ts = (l.timestamp || "").replace("T", " ").slice(0, 19);
                return `<div class="log-line"><span class="log-ts">${ts}</span> <span class="${cls}">[${lvl}]</span> <span class="log-msg">${escHtml(l.message)}</span></div>`;
            }).join("");
            if (atBottom) logScroll.scrollTop = logScroll.scrollHeight;
        } catch {
        }
    }

    document.getElementById("btn-send").addEventListener("click", async () => {
        statusEl.textContent = "";
        const action = actionEl.value.trim();
        if (!action) {
            statusEl.textContent = "Select a command first";
            statusEl.className = "status-err";
            return;
        }
        let payload;
        try {
            payload = payloadEl.value.trim() ? JSON.parse(payloadEl.value) : {};
        } catch {
            statusEl.textContent = "Invalid JSON";
            statusEl.className = "status-err";
            return;
        }
        try {
            const r = await fetch("/execute", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({action, payload})
            });
            if (!r.ok) throw new Error(r.statusText);
            statusEl.textContent = "✓ Sent";
            statusEl.className = "status-ok";
            setTimeout(() => statusEl.textContent = "", 3000);
            await fetchLogs();
        } catch (e) {
            statusEl.textContent = "Error: " + e.message;
            statusEl.className = "status-err";
        }
    });

    fetchState();
    fetchHealth();
    fetchLogs();
    setInterval(fetchState, 5000);
    setInterval(fetchHealth, 10000);
    setInterval(fetchLogs, 3000);
</script>
</body>
</html>
